name: Build Desktop App (Win/Mac/Linux)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 0.1.1, without leading v)"
        required: true
        default: "0.1.0"

concurrency:
  group: release-${{ github.workflow }}-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Update app version
        shell: bash
        run: |
          NEW_VER="${{ github.event.inputs.version }}"
          echo "Setting version to $NEW_VER"

          npm version "$NEW_VER" --no-git-tag-version

          node -e "
            const fs = require('fs');
            const version = process.env.NEW_VER;

            const tauriConfPath = 'src-tauri/tauri.conf.json';
            if (fs.existsSync(tauriConfPath)) {
              const tauriConf = JSON.parse(fs.readFileSync(tauriConfPath, 'utf8'));
              tauriConf.version = version;
              fs.writeFileSync(tauriConfPath, JSON.stringify(tauriConf, null, 2) + '\n');
            }

            const cargoPath = 'src-tauri/Cargo.toml';
            if (fs.existsSync(cargoPath)) {
              let content = fs.readFileSync(cargoPath, 'utf8');
              content = content.replace(/^version\\s*=\\s*\".*?\"/m, 'version = \"' + version + '\"');
              fs.writeFileSync(cargoPath, content);
            }
          "
        env:
          NEW_VER: ${{ github.event.inputs.version }}

      - name: Install system dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Verify frontend build
        run: npm run build

      - name: Delete existing release and tag (if any)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ github.event.inputs.version }}"
          gh release delete "$VERSION" --yes --cleanup-tag || true
          git push origin --delete "$VERSION" || true

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ github.event.inputs.version }}
          releaseName: Simple Map Demo v${{ github.event.inputs.version }}
          releaseBody: |
            Simple Map Demo release v${{ github.event.inputs.version }}

            Downloads:
            - Windows: .msi or .exe
            - macOS: .dmg or .app
            - Linux: .AppImage or .deb
          releaseDraft: false
          prerelease: false
