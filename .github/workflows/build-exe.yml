name: 构建 桌面端程序 (Win/Mac/Linux)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 v0.1.0）'
        required: false
        default: 'v0.1.0'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装系统依赖 (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: 安装 npm 依赖
        run: npm install

      - name: 构建 Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.version }}
          releaseName: 'Simple Map Demo ${{ github.event.inputs.version }}'
          releaseBody: |
            ## 地图 Web API 测试平台 ${{ github.event.inputs.version }}

            支持百度地图、Google Maps、高德地图 API 测试。

            ### 下载
            - **Windows**: 下载 `.msi` 或 `.exe`
            - **macOS**: 下载 `.dmg` 或 `.app`
            - **Linux**: 下载 `.AppImage` 或 `.deb`
          releaseDraft: false
          prerelease: false
